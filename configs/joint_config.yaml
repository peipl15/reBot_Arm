# Joint configuration for Seeed reBot 7-DOF arm.
#
# Coordinates: motor "native" frame (encoder direction as wired).
#   sign converts to "user/URDF" frame:  user_pos = sign * motor_pos
#
# Hardware params (pmax_fw/vmax_fw/tmax_fw) sourced from
#   outputs/motor_params_20260610_151211.txt (raw register dump).
# Soft limits backfilled from Phase 2 ramp characterization on 2026-06-10
#   (outputs/range_j{1..7}_*.csv).
#
# Semantic naming refined per user mental model on 2026-06-10:
#   j4 = wrist_flex (上抬), j5 = wrist_yaw (左右水平), j6 = wrist_roll (径向).
#
# Sign flips for j2 and j3 (from -1 to +1) because the bending-with-gravity
# direction (= our test's NEG side) is what users intuitively call "+90°"
# in their mental model — i.e. "elbow bent up to 90°" or "shoulder dropped
# 90°" should be commanded as positive in user code.

defaults:
  transport: dm-device
  dm_device_type: usb2canfd-dual
  dm_channel: 0
  feedback_dt_ms: 20
  watchdog:
    torque_warn_ratio: 0.60       # log warning above this fraction of TMAX
    torque_abort_ratio: 0.80      # disable + raise above this fraction of TMAX
    tracking_error_rad: 0.05      # |cmd - actual| > this is suspicious
    tracking_error_timeout_s: 0.5 # ... for this long, abort
    status_must_be: 1             # any other status_code aborts

joints:
  # j1 base — asymmetric: cable/torque-trip on one side, free-spinning on
  # the other. Original Phase 2 calibration (2026-06-10) on the OLD encoder
  # zero: soft=[-3.05, +0.60]. On 2026-06-16 the encoder was re-zeroed at a
  # position +1.4868 rad from the old zero (set_joint_zero.py at user's
  # request, persisted to flash) so the same physical hardstops now sit at
  # +1.4868 rad offset in the new frame:
  #   new_soft_min = old_soft_min + 1.4868 = -1.563 → use -1.50 (~3° buffer)
  #   new_soft_max = old_soft_max + 1.4868 = +2.087 → use +2.05 (~2° buffer)
  - index: 1
    id: 0x01
    feedback_id: 0x11
    name: base
    model: "4340"
    sign: +1
    pmax_fw: 12.5
    vmax_fw: 10.0
    tmax_fw: 28.0
    soft_min: -1.50
    soft_max: +2.05
    vlim_default: 0.5

  # j2 shoulder — sign FLIPPED. + = drop with gravity, - is locked out.
  # Phase 2 (2026-06-10) capped soft_max at +90° because that was the
  # --max-deg test cap, NOT a torque trip. Teleop test on 2026-06-16
  # confirmed leader can ask for up to +170° (Seeed range_max) and
  # follower follows it cleanly. Expanded soft_max to +180° (+π) per user
  # request — leader can now drive full natural fold.
  - index: 2
    id: 0x02
    feedback_id: 0x12
    name: shoulder
    model: "4340"
    sign: +1          # flipped from -1 on 2026-06-10 per gravity-aware sign convention
    pmax_fw: 12.5
    vmax_fw: 10.0
    tmax_fw: 28.0
    soft_min: 0.0
    soft_max: +3.1416  # +180°
    vlim_default: 0.5

  # j3 elbow — sign FLIPPED. + = bend with gravity, - is locked out.
  # Same expansion as j2: Phase 2 cap at +90° was the test --max-deg, not
  # a hardstop. Expanded to +180° on 2026-06-16 per user request after
  # teleop revealed real range is much wider. Self-collision when j3 > 90°
  # with j2 horizontal is the user's responsibility to avoid (no
  # pose-dependent collision check in the wrapper).
  - index: 3
    id: 0x03
    feedback_id: 0x13
    name: elbow
    model: "4340"
    sign: +1          # flipped from -1 on 2026-06-10
    pmax_fw: 12.5
    vmax_fw: 10.0
    tmax_fw: 28.0
    soft_min: 0.0
    soft_max: +3.1416  # +180°
    vlim_default: 0.5

  # j4 wrist_flex (上抬 — wrist lifts).
  # Phase 2 (2026-06-10) recorded a torque trip at -6° in NEG direction and
  # we set soft_min=0 thinking that was the mechanical limit. During first
  # teleop test (2026-06-16) the user observed j4 CAN actually go negative
  # when other joints (j5/j6/etc.) are in different positions — the -6° trip
  # was a posture-dependent self-collision, not the wrist motor's hardstop.
  # Expanded soft_min to -80° (-1.396 rad) per user spec. If self-collision
  # is a concern in some poses, a higher-layer collision-check is needed;
  # the wrapper soft limit can't be pose-dependent.
  - index: 4
    id: 0x04
    feedback_id: 0x14
    name: wrist_flex
    model: "4340"
    sign: +1
    pmax_fw: 12.5
    vmax_fw: 30.0
    tmax_fw: 10.0
    soft_min: -1.396   # -80°
    soft_max: +1.5708  # +90°
    vlim_default: 1.0

  # j5 wrist_yaw (左右水平转向) — symmetric ±85° (5° buffer from ±90° cap).
  - index: 5
    id: 0x05
    feedback_id: 0x15
    name: wrist_yaw
    model: "4340"
    sign: +1
    pmax_fw: 12.5
    vmax_fw: 30.0
    tmax_fw: 10.0
    soft_min: -1.484  # -85°
    soft_max: +1.484  # +85°
    vlim_default: 1.0

  # j6 wrist_roll (径向旋转) — near-continuous. ±175° (5° buffer from ±180°).
  - index: 6
    id: 0x06
    feedback_id: 0x16
    name: wrist_roll
    model: "4340"
    sign: +1
    pmax_fw: 12.5
    vmax_fw: 30.0
    tmax_fw: 10.0
    soft_min: -3.05   # -175°
    soft_max: +3.05   # +175°
    vlim_default: 1.0

  # j7 gripper — screw-driven, asymmetric. +0.04 rad (+2°) is just inside
  # the close-side torque trip at +4°. -6.00 rad (-344°) gives ~8° buffer
  # from the open-side torque trip at -352°. Backlash: encoder=0 may not
  # always be physically closed; "close" command should target +0.04
  # (motor will press into hard stop and force-close).
  - index: 7
    id: 0x07
    feedback_id: 0x17
    name: gripper
    model: "4340"
    sign: +1
    pmax_fw: 12.5
    vmax_fw: 30.0
    tmax_fw: 10.0
    soft_min: -6.00   # -344°
    soft_max: +0.04   # +2.3°
    vlim_default: 1.0
